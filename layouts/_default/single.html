{{ define "main" }}
<article class="post">
  <div class="post-header" style="margin-bottom: 48px; text-align: center;">
    <div class="post-meta" style="margin-bottom: 12px;">{{ .Date.Format "January 02, 2006" }} • {{ .ReadingTime }} MIN
      READ</div>
    <h1>{{ .Title }}</h1>
  </div>

  <div class="post-content">
    {{ .Content }}
  </div>

  <div style="margin-top: 80px; padding-top: 40px; border-top: 1px solid var(--border-color); text-align: center;">
    <a href="/" style="color: var(--accent-color); text-decoration: none; font-weight: 600; font-size: 0.95rem;">← Back
      to Home</a>
  </div>
</article>
{{ end }}
