{{ define "main" }}
<div class="home">
  <div class="timeline">
    {{ range (where .Site.RegularPages "Section" "posts") }}
    <div class="timeline-item">
      <div class="timeline-marker"></div>
      <div class="timeline-content">
        <a href="{{ .Permalink }}" class="timeline-post">
          <div class="timeline-date">{{ .Date.Format "Jan 02, 2006" }}</div>
          <h2>{{ .Title }}</h2>
          <p class="timeline-summary">{{ .Summary | truncate 140 }}</p>
          <div class="timeline-meta">{{ .ReadingTime }} MIN READ</div>
        </a>
      </div>
    </div>
    {{ end }}
  </div>
</div>
{{ end }}
